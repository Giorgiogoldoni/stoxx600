<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAPTOR — Breadth A/D</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{--bg:#f4f6fa;--surface:#fff;--surface2:#f0f2f7;--surface3:#e4e8f0;--border:#d0d7e4;--accent:#b8860b;--bull:#1a9e63;--bear:#d63040;--text:#1a2236;--text2:#4a5a72;--text3:#8a9ab4;--blue:#2678c8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;}
#topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:var(--surface);border-bottom:1px solid var(--border);}
.logo{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;letter-spacing:4px;color:var(--accent);}
.logo span{color:var(--text2);font-size:11px;letter-spacing:2px;margin-left:6px;}
#last-update{font-size:10px;color:var(--text3);}
.topbar-btn{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:5px 12px;cursor:pointer;font-family:inherit;font-size:11px;transition:all .2s;}
.topbar-btn:hover{border-color:var(--accent);color:var(--accent);}
#nav{background:var(--surface2);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;gap:8px;align-items:center;}
#nav span{font-size:9px;letter-spacing:1.5px;color:var(--text3);font-family:'Rajdhani',sans-serif;font-weight:600;}
#nav a{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;padding:3px 10px;border-radius:3px;text-decoration:none;background:var(--surface3);color:var(--text2);border:1px solid var(--border);}
#nav a.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#main{padding:16px;max-width:1400px;margin:0 auto;}
.market-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden;}
.market-header{display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.market-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;}
.market-stats{display:flex;gap:20px;margin-left:auto;flex-wrap:wrap;}
.mstat{display:flex;flex-direction:column;align-items:center;}
.mstat .lbl{font-size:9px;color:var(--text3);letter-spacing:1px;}
.mstat .val{font-size:15px;font-weight:600;}
.adv{color:var(--bull);}.dec{color:var(--bear);}.neu{color:var(--text2);}
.market-body{padding:12px 16px;}
.chart-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.chart-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.chart-label{font-size:10px;color:var(--text2);padding:6px 10px 4px;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);}
.status-bar{padding:6px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:10px;color:var(--text3);}
.error-box{background:rgba(214,48,64,0.06);border:1px solid rgba(214,48,64,0.25);border-radius:6px;padding:20px;margin:16px;color:var(--text2);font-size:12px;line-height:1.7;}
.error-box code{background:var(--surface3);padding:2px 5px;border-radius:3px;font-size:11px;}
@media(max-width:900px){.chart-row{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">RAPTOR <span>BREADTH A/D</span></div>
  <span id="last-update">Caricamento...</span>
  <div style="margin-left:auto;">
    <button class="topbar-btn" onclick="loadData()">&#8635; Aggiorna</button>
  </div>
</div>
<div id="nav">
  <span>MERCATI:</span>
  <a href="index.html">&#127466;&#127482; STOXX 600</a>
  <a href="sp500.html">&#127482;&#127480; S&amp;P 500</a>
  <a href="nasdaq100.html">&#128202; NASDAQ 100</a>
  <a href="breadth.html" class="active">&#128200; A/D BREADTH</a>
</div>
<div id="main"><p style="padding:20px;color:var(--text3)">Caricamento...</p></div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/Giorgiogoldoni/stoxx600/main/data/breadth.json';

const chartOpts = {
  layout:{background:{type:'Solid',color:'#f0f2f7'},textColor:'#4a5a72'},
  grid:{vertLines:{color:'#e4e8f0'},horzLines:{color:'#e4e8f0'}},
  crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
  timeScale:{borderColor:'#d0d7e4',timeVisible:false},
  rightPriceScale:{borderColor:'#d0d7e4'}
};

function toTS(d){ return Math.floor(new Date(d).getTime()/1000); }

function renderMarket(key, market) {
  const data = market.data;
  if (!data || data.length < 5) return;
  const last = data[data.length-1];
  const oscColor = last.mcclellan >= 0 ? 'var(--bull)' : 'var(--bear)';
  const sumColor = last.summation >= 0 ? 'var(--bull)' : 'var(--bear)';
  const ratio = last.dec > 0 ? (last.adv/last.dec).toFixed(2) : '∞';

  const block = document.createElement('div');
  block.className = 'market-block';
  block.innerHTML = `
    <div class="market-header">
      <div class="market-title">${market.name}</div>
      <div class="market-stats">
        <div class="mstat"><span class="lbl">ADVANCING</span><span class="val adv">${last.adv}</span></div>
        <div class="mstat"><span class="lbl">DECLINING</span><span class="val dec">${last.dec}</span></div>
        <div class="mstat"><span class="lbl">UNCHANGED</span><span class="val neu">${last.unc}</span></div>
        <div class="mstat"><span class="lbl">A/D RATIO</span><span class="val">${ratio}</span></div>
        <div class="mstat"><span class="lbl">McCLELLAN</span><span class="val" style="color:${oscColor}">${last.mcclellan.toFixed(1)}</span></div>
        <div class="mstat"><span class="lbl">SUMMATION</span><span class="val" style="color:${sumColor}">${Math.round(last.summation)}</span></div>
      </div>
    </div>
    <div class="market-body">
      <div class="chart-row">
        <div class="chart-box"><div class="chart-label">A/D LINE (cumulativa)</div><div id="ad-${key}" style="height:200px;"></div></div>
        <div class="chart-box"><div class="chart-label">McCLELLAN OSCILLATOR</div><div id="osc-${key}" style="height:200px;"></div></div>
        <div class="chart-box"><div class="chart-label">McCLELLAN SUMMATION INDEX</div><div id="sum-${key}" style="height:200px;"></div></div>
      </div>
    </div>
    <div class="status-bar">${market.name} · ${data.length} giorni · ${market.ticker_count} titoli · Ultimo: ${last.date} · Adv ${last.adv} / Dec ${last.dec} / Unc ${last.unc} · McClellan ${last.mcclellan.toFixed(1)} · Summation ${Math.round(last.summation)}</div>
  `;
  document.getElementById('main').appendChild(block);

  const z = (c, data) => {
    const zl = c.addLineSeries({color:'rgba(0,0,0,0.15)',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    zl.setData([{time:toTS(data[0].date),value:0},{time:toTS(data[data.length-1].date),value:0}]);
  };

  const c1 = LightweightCharts.createChart(document.getElementById(`ad-${key}`),{...chartOpts,height:200});
  const s1 = c1.addLineSeries({color:'#2678c8',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
  s1.setData(data.map(d=>({time:toTS(d.date),value:d.ad_line})));
  z(c1,data); c1.timeScale().fitContent();

  const c2 = LightweightCharts.createChart(document.getElementById(`osc-${key}`),{...chartOpts,height:200});
  const s2 = c2.addHistogramSeries({priceLineVisible:false,lastValueVisible:true});
  s2.setData(data.map(d=>({time:toTS(d.date),value:d.mcclellan,color:d.mcclellan>=0?'rgba(26,158,99,0.7)':'rgba(214,48,64,0.7)'})));
  z(c2,data); c2.timeScale().fitContent();

  const c3 = LightweightCharts.createChart(document.getElementById(`sum-${key}`),{...chartOpts,height:200});
  const s3 = c3.addLineSeries({color:'#b8860b',lineWidth:2,priceLineVisible:false,lastValueVisible:true});
  s3.setData(data.map(d=>({time:toTS(d.date),value:d.summation})));
  z(c3,data); c3.timeScale().fitContent();

  [c1,c2,c3].forEach(c=>{
    c.timeScale().subscribeVisibleLogicalRangeChange(r=>{
      if(!r)return;
      [c1,c2,c3].filter(x=>x!==c).forEach(x=>{try{x.timeScale().setVisibleLogicalRange(r);}catch(e){}});
    });
  });
}

async function loadData() {
  const main = document.getElementById('main');
  main.innerHTML = '<p style="padding:20px;color:var(--text3)">Caricamento...</p>';
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    main.innerHTML = '';
    for (const key of ['stoxx','sp500','ndx']) {
      if (json.markets[key]) renderMarket(key, json.markets[key]);
    }
    const dt = new Date(json.generated_at);
    document.getElementById('last-update').textContent =
      'Dati del: ' + dt.toLocaleDateString('it-IT') + ' ' + dt.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) + ' UTC';
  } catch(e) {
    main.innerHTML = `<div class="error-box">
      <strong>&#9888; Dati non ancora disponibili</strong><br><br>
      Il file <code>data/breadth.json</code> non esiste ancora nel repo.<br><br>
      <strong>Per generarlo ora:</strong><br>
      1. Vai su GitHub → repo <strong>stoxx600</strong> → tab <strong>Actions</strong><br>
      2. Clicca <strong>"Update Breadth Data"</strong> nella lista a sinistra<br>
      3. Clicca <strong>"Run workflow"</strong> → <strong>Run workflow</strong><br><br>
      Dopo ~3 minuti i dati saranno disponibili qui.<br>
      Il workflow girerà poi <strong>automaticamente ogni sera alle 23:00 CET</strong> (lun-ven).
    </div>`;
    document.getElementById('last-update').textContent = 'Dati non disponibili';
  }
}

loadData();
</script>
</body>
</html>
