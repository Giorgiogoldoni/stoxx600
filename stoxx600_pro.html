<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>STOXX600 PRO — Screener</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 18px; color:#111; }
    h1 { margin-bottom:6px; }
    table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }
    th, td { padding:8px 10px; border:1px solid #e6e6e6; text-align:left; }
    th { background:#fafafa; position:sticky; top:0; z-index:2; }
    .positive { color:#0a7a07; font-weight:600; }
    .negative { color:#b00020; font-weight:600; }
    .signal-buy { background:#e6f7ea; color:#0a7a07; padding:4px 8px; border-radius:6px; }
    .signal-hold { background:#f3f4f6; color:#333; padding:4px 8px; border-radius:6px; }
    .signal-sell { background:#fff0f0; color:#b00020; padding:4px 8px; border-radius:6px; }
    .icon { cursor:pointer; font-size:16px; }
    #loader { margin-top:12px; color:#666; }
    /* Modal */
    .modal { position:fixed; inset:0; display:none; background:rgba(0,0,0,0.45); align-items:center; justify-content:center; z-index:50; }
    .modal .panel { width:95%; max-width:1100px; height:80vh; background:#fff; border-radius:8px; padding:12px; box-shadow:0 8px 30px rgba(0,0,0,0.2); overflow:hidden; display:flex; flex-direction:column; }
    .modal .header { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .meta { font-size:13px; color:#444; }
    .chart-wrap { flex:1; margin-top:8px; }
    .news-list { max-height:160px; overflow:auto; margin-top:8px; font-size:13px; }
    .balance-grid { display:flex; gap:12px; margin-top:8px; font-size:13px; flex-wrap:wrap; }
    .balance-item { background:#fafafa; padding:8px; border-radius:6px; min-width:140px; }
    button { cursor:pointer; }
  </style>
  <!-- Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <h1>STOXX600 PRO — Screener</h1>
  <div class="meta">Lista caricata dal CSV; risolvo i simboli Yahoo automaticamente e mostro indicatori, bilanci e news.</div>

  <div id="loader">Preparazione dati…</div>

  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Nome</th>
        <th>Prezzo</th>
        <th>Var %</th>
        <th>KAMA Fast</th>
        <th>KAMA Slow</th>
        <th>SAR</th>
        <th>Rating</th>
        <th>Segnale</th>
        <th>Grafico</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- Modal per grafico e dettagli -->
  <div id="modal" class="modal" role="dialog" aria-hidden="true">
    <div class="panel">
      <div class="header">
        <div>
          <strong id="modal-title"></strong>
          <div id="modal-sub" class="meta"></div>
        </div>
        <div>
          <button id="close-modal">Chiudi</button>
        </div>
      </div>

      <div class="chart-wrap" id="chart-wrap"></div>

      <div style="display:flex; gap:12px; margin-top:8px;">
        <div style="flex:1">
          <div class="balance-grid" id="balance-grid"></div>
        </div>
        <div style="width:360px">
          <div><strong>News recenti</strong></div>
          <div class="news-list" id="news-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
  /************************************************************************
   * 1) Lista CSV incorporata (usa la lista che hai caricato)
   *    Se preferisci puoi sostituire con ticker Yahoo già noti.
   ************************************************************************/
  const csvText = `3I Group;stoxx600
A2A;stoxx600
AAK;stoxx600
Aalberts Industries;stoxx600
ABB;stoxx600
...`; // TRUNCATO per brevità: il codice reale userà l'intero CSV caricato

  // Se il CSV è lungo, puoi sostituire csvText con la stringa completa.
  // Qui trasformiamo ogni riga in un oggetto {name, index}
  function parseCsv(text) {
    return text.split(/\r?\n/).map(line => {
      const parts = line.split(";");
      if (!parts[0]) return null;
      return { name: parts[0].trim(), index: parts[1] ? parts[1].trim() : "" };
    }).filter(Boolean);
  }

  const companies = parseCsv(csvText);

  /************************************************************************
   * 2) Utility fetch per Yahoo Finance
   *    - risolve simbolo da nome
   *    - ottiene quote, history, bilanci, news
   ************************************************************************/
  async function yahooSearchSymbol(query) {
    const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}`;
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const j = await r.json();
      const first = (j.quotes || []).find(q => q.symbol && q.exchange);
      return first ? { symbol: first.symbol, shortname: first.shortname || first.longname || query } : null;
    } catch (e) {
      console.error("searchSymbol", query, e);
      return null;
    }
  }

  async function fetchQuote(symbol) {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symbol)}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    return (j.quoteResponse && j.quoteResponse.result && j.quoteResponse.result[0]) || null;
  }

  async function fetchHistory(symbol, period = "1y", interval = "1d") {
    // period examples: 1mo,3mo,6mo,1y,5y
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=${period}&interval=${interval}`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const j = await r.json();
    const chart = j.chart && j.chart.result && j.chart.result[0];
    if (!chart) return null;
    const timestamps = chart.timestamp || [];
    const quotes = (chart.indicators && chart.indicators.quote && chart.indicators.quote[0]) || {};
    const o = quotes.open || [], h = quotes.high || [], l = quotes.low || [], c = quotes.close || [], v = quotes.volume || [];
    const data = timestamps.map((t, i) => ({
      time: new Date(t * 1000).toISOString().slice(0,10),
      open: o[i], high: h[i], low: l[i], close: c[i], volume: v[i]
    })).filter(d => d.close != null);
    return data;
  }

  async function fetchFinancials(symbol) {
    const modules = ["incomeStatementHistory","balanceSheetHistory","cashflowStatementHistory"];
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${encodeURIComponent(symbol)}?modules=${modules.join(",")}`;
    try {
      const r = await fetch(url);
      if (!r.ok) return null;
      const j = await r.json();
      return j.quoteSummary && j.quoteSummary.result && j.quoteSummary.result[0] || null;
    } catch (e) {
      console.error("fetchFinancials", symbol, e);
      return null;
    }
  }

  async function fetchNews(symbolOrName) {
    const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(symbolOrName)}`;
    try {
      const r = await fetch(url);
      if (!r.ok) return [];
      const j = await r.json();
      return (j.news || []).slice(0,6).map(n => ({ title: n.title, provider: n.publisher, link: n.link, summary: n.summary, date: n.providerPublishTime }));
    } catch (e) {
      return [];
    }
  }

  /************************************************************************
   * 3) Indicatori tecnici: KAMA, Parabolic SAR, ROC, ATR
   ************************************************************************/
  function calculateKAMA(prices, length = 10, fast = 2, slow = 30) {
    const fastSC = 2 / (fast + 1);
    const slowSC = 2 / (slow + 1);
    const kama = new Array(prices.length).fill(null);
    if (prices.length <= length) return kama;
    kama[length] = prices[length];
    for (let i = length + 1; i < prices.length; i++) {
      let change = Math.abs(prices[i] - prices[i - length]);
      let volatility = 0;
      for (let j = i - length + 1; j <= i; j++) volatility += Math.abs(prices[j] - prices[j - 1]);
      let ER = volatility === 0 ? 0 : change / volatility;
      let SC = Math.pow(ER * (fastSC - slowSC) + slowSC, 2);
      kama[i] = kama[i - 1] + SC * (prices[i] - kama[i - 1]);
    }
    return kama;
  }

  function calculateParabolicSAR(highs, lows, step = 0.02, maxStep = 0.2) {
    const sar = new Array(highs.length).fill(null);
    if (highs.length === 0) return sar;
    let isUp = true;
    let af = step;
    let ep = highs[0];
    sar[0] = lows[0];
    for (let i = 1; i < highs.length; i++) {
      let prevSar = sar[i - 1];
      let nextSar = prevSar + af * (ep - prevSar);
      if (isUp) {
        if (lows[i] < nextSar) {
          isUp = false;
          nextSar = ep;
          af = step;
          ep = lows[i];
        } else {
          if (highs[i] > ep) { ep = highs[i]; af = Math.min(af + step, maxStep); }
        }
      } else {
        if (highs[i] > nextSar) {
          isUp = true;
          nextSar = ep;
          af = step;
          ep = highs[i];
        } else {
          if (lows[i] < ep) { ep = lows[i]; af = Math.min(af + step, maxStep); }
        }
      }
      sar[i] = nextSar;
    }
    return sar;
  }

  function calculateROC(prices, period) {
    if (prices.length <= period) return null;
    const last = prices[prices.length - 1];
    const prev = prices[prices.length - 1 - period];
    return ((last - prev) / prev) * 100;
  }

  function calculateATR(highs, lows, closes, period = 14) {
    const trs = [];
    for (let i = 1; i < closes.length; i++) {
      const tr = Math.max(
        highs[i] - lows[i],
        Math.abs(highs[i] - closes[i - 1]),
        Math.abs(lows[i] - closes[i - 1])
      );
      trs.push(tr);
    }
    if (trs.length < period) return null;
    let atr = trs.slice(0, period).reduce((a,b)=>a+b,0)/period;
    for (let i = period; i < trs.length; i++) {
      atr = (atr * (period - 1) + trs[i]) / period;
    }
    return atr;
  }

  /************************************************************************
   * 4) Rating e segnale
   ************************************************************************/
  function computeRatingAndSignal(latestClose, kamaFastArr, kamaSlowArr, sarArr, roc3, roc6, roc12, atr) {
    let trend = 0, momentum = 0, stability = 0;
    const price = latestClose;
    const kf = kamaFastArr[kamaFastArr.length - 1];
    const ks = kamaSlowArr[kamaSlowArr.length - 1];
    const sarVal = sarArr[sarArr.length - 1];

    if (price > ks) trend += 15;
    if (kf > ks) trend += 15;
    if (sarVal < price) trend += 10;

    if (roc3 != null && roc3 > 0) momentum += 10;
    if (roc6 != null && roc6 > 0) momentum += 15;
    if (roc12 != null && roc12 > 0) momentum += 15;

    const atrRatio = atr && price ? atr / price : 0.03;
    if (atrRatio < 0.015) stability += 20;
    else if (atrRatio < 0.025) stability += 10;
    else if (atrRatio < 0.04) stability += 5;

    const rating = Math.round(Math.min(100, trend + momentum + stability));

    let signal = "HOLD";
    if (price > ks && kf > ks && sarVal < price && roc3 > 0) signal = "BUY";
    else if (kf < ks || sarVal > price || roc3 < 0) signal = "SELL";

    return { rating, signal };
  }

  /************************************************************************
   * 5) Rendering tabella e grafico
   ************************************************************************/
  const tbody = document.querySelector("#main-table tbody");
  const loader = document.getElementById("loader");
  const table = document.getElementById("main-table");

  async function processCompany(item) {
    // 1) risolvo simbolo
    const found = await yahooSearchSymbol(item.name);
    if (!found) return null;
    const symbol = found.symbol;
    const shortname = found.shortname || item.name;

    // 2) quote e history
    const quote = await fetchQuote(symbol);
    const history = await fetchHistory(symbol, "1y", "1d");
    if (!history || history.length < 60) return { symbol, shortname, quote, history, error: "no history" };

    const closes = history.map(d => d.close);
    const highs = history.map(d => d.high);
    const lows = history.map(d => d.low);

    // 3) indicators
    const kamaFast = calculateKAMA(closes, 10, 2, 30);
    const kamaSlow = calculateKAMA(closes, 30, 2, 30);
    const sar = calculateParabolicSAR(highs, lows, 0.02, 0.2);
    const roc3 = calculateROC(closes, Math.round(21)); // ~1 month
    const roc6 = calculateROC(closes, Math.round(63)); // ~3 months
    const roc12 = calculateROC(closes, Math.round(252)); // ~12 months
    const atr = calculateATR(highs, lows, closes, 14);

    // 4) financials and news (lazy: fetch only summary here)
    const financials = await fetchFinancials(symbol);
    const news = await fetchNews(symbol);

    // 5) rating & signal
    const latestClose = closes[closes.length - 1];
    const { rating, signal } = computeRatingAndSignal(latestClose, kamaFast, kamaSlow, sar, roc3, roc6, roc12, atr);

    return { symbol, shortname, quote, history, kamaFast, kamaSlow, sar, roc3, roc6, roc12, atr, financials, news, rating, signal };
  }

  // Batch processing with concurrency limit
  async function processAll(list) {
    const results = [];
    const concurrency = 6;
    for (let i = 0; i < list.length; i += concurrency) {
      const batch = list.slice(i, i + concurrency);
      const promises = batch.map(it => processCompany(it).catch(e => { console.error(e); return null; }));
      const res = await Promise.all(promises);
      results.push(...res.filter(Boolean));
      // small pause to avoid rate limits
      await new Promise(r => setTimeout(r, 600));
    }
    return results;
  }

  // Render row
  function renderRow(data) {
    const tr = document.createElement("tr");
    const price = data.quote ? data.quote.regularMarketPrice : "";
    const changePct = data.quote ? data.quote.regularMarketChangePercent : null;
    const kf = data.kamaFast ? data.kamaFast[data.kamaFast.length - 1] : "";
    const ks = data.kamaSlow ? data.kamaSlow[data.kamaSlow.length - 1] : "";
    const sarVal = data.sar ? data.sar[data.sar.length - 1] : "";

    tr.innerHTML = `
      <td>${data.symbol}</td>
      <td>${data.shortname}</td>
      <td>${price != null ? price.toFixed(2) : ""}</td>
      <td class="${changePct>0?'positive':(changePct<0?'negative':'')}">${changePct!=null?changePct.toFixed(2)+' %':''}</td>
      <td>${kf?kf.toFixed(2):''}</td>
      <td>${ks?ks.toFixed(2):''}</td>
      <td>${sarVal?sarVal.toFixed(2):''}</td>
      <td><strong>${data.rating}</strong></td>
      <td>${data.signal === 'BUY' ? '<span class="signal-buy">BUY</span>' : (data.signal==='SELL'?'<span class="signal-sell">SELL</span>':'<span class="signal-hold">HOLD</span>')}</td>
      <td><span class="icon" data-symbol="${data.symbol}">📈</span></td>
    `;
    tbody.appendChild(tr);
  }

  // Modal and chart
  const modal = document.getElementById("modal");
  const modalTitle = document.getElementById("modal-title");
  const modalSub = document.getElementById("modal-sub");
  const chartWrap = document.getElementById("chart-wrap");
  const balanceGrid = document.getElementById("balance-grid");
  const newsList = document.getElementById("news-list");
  document.getElementById("close-modal").addEventListener("click", ()=> modal.style.display='none');

  function openModal(data) {
    modalTitle.textContent = `${data.symbol} — ${data.shortname}`;
    modalSub.textContent = `Rating ${data.rating} · Segnale ${data.signal}`;
    // balance
    balanceGrid.innerHTML = '';
    try {
      const fin = data.financials;
      if (fin && fin.incomeStatementHistory && fin.incomeStatementHistory.incomeStatementHistory) {
        const inc = fin.incomeStatementHistory.incomeStatementHistory[0];
        balanceGrid.innerHTML += `<div class="balance-item"><strong>Ricavi</strong><div>${inc.totalRevenue ? (inc.totalRevenue.raw).toLocaleString() : '—'}</div></div>`;
        balanceGrid.innerHTML += `<div class="balance-item"><strong>Utile netto</strong><div>${inc.netIncome ? (inc.netIncome.raw).toLocaleString() : '—'}</div></div>`;
      } else {
        balanceGrid.innerHTML += `<div class="balance-item">Bilanci non disponibili</div>`;
      }
    } catch(e){ balanceGrid.innerHTML = `<div class="balance-item">Errore lettura bilanci</div>`; }

    // news
    newsList.innerHTML = '';
    (data.news || []).forEach(n => {
      const d = new Date((n.date || Date.now())*1000);
      const li = document.createElement("div");
      li.style.padding = "6px 0";
      li.innerHTML = `<div style="font-weight:600">${n.title}</div><div style="color:#666;font-size:12px">${n.provider || ''} · ${d.toLocaleString()}</div><div style="font-size:13px">${n.summary || ''}</div>`;
      newsList.appendChild(li);
    });

    // chart
    chartWrap.innerHTML = '';
    const chartDiv = document.createElement("div");
    chartDiv.style.height = "420px";
    chartWrap.appendChild(chartDiv);

    const chart = LightweightCharts.createChart(chartDiv, { layout: { background: { color: '#ffffff' }, textColor: '#333' }, rightPriceScale: { visible: true } });
    const candleSeries = chart.addCandlestickSeries();
    const kfSeries = chart.addLineSeries({ color: '#0a7a07', lineWidth: 1.5 });
    const ksSeries = chart.addLineSeries({ color: '#0077b6', lineWidth: 1.5 });
    const sarSeries = chart.addScatterSeries({ color: '#b00020', shape: 'circle' });

    const hist = data.history.map(h => ({ time: h.time, open: h.open, high: h.high, low: h.low, close: h.close }));
    candleSeries.setData(hist);

    const kfData = data.kamaFast.map((v,i) => v ? ({ time: data.history[i].time, value: Number(v.toFixed(4)) }) : null).filter(Boolean);
    const ksData = data.kamaSlow.map((v,i) => v ? ({ time: data.history[i].time, value: Number(v.toFixed(4)) }) : null).filter(Boolean);
    const sarData = data.sar.map((v,i) => v ? ({ time: data.history[i].time, value: Number(v.toFixed(4)) }) : null).filter(Boolean);

    kfSeries.setData(kfData);
    ksSeries.setData(ksData);
    sarSeries.setData(sarData);

    modal.style.display = 'flex';
  }

  // Click handler for icons
  document.addEventListener("click", (e) => {
    if (e.target && e.target.classList.contains("icon")) {
      const sym = e.target.dataset.symbol;
      // find data in cache
      const cached = window.__stoxx_cache && window.__stoxx_cache[sym];
      if (cached) openModal(cached);
    }
  });

  /************************************************************************
   * 6) Avvio: processa un sottoinsieme per demo o tutta la lista
   ************************************************************************/
  (async function main() {
    loader.textContent = "Risolvo simboli e scarico dati (prima pagina demo)…";
    // Per demo: processa i primi 20. Per produzione, usa companies (tutti).
    const demoList = companies.slice(0, 40); // modifica qui per più o meno
    const results = await processAll(demoList);

    // cache globale per modal
    window.__stoxx_cache = window.__stoxx_cache || {};
    results.forEach(r => {
      if (!r) return;
      window.__stoxx_cache[r.symbol] = r;
      renderRow(r);
    });

    loader.style.display = 'none';
    table.style.display = '';
  })();

  </script>
</body>
</html>
